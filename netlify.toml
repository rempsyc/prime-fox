[build]
  command = """
    set -e
    echo "=== Starting Blog build process ==="
    echo "Node version: $(node --version)"
    echo "pnpm version: $(pnpm --version)"
    echo "Hugo version: $(hugo version)"
    echo "Go version: $(go version || echo 'Go not available')"
    
    echo "=== Installing dependencies ==="
    pnpm install --verbose --no-frozen-lockfile
    
    echo "=== Running Hugo build ==="
    hugo --gc --minify -b $URL --logLevel debug --printI18nWarnings --printPathWarnings
    
    echo "=== Running Pagefind indexing ==="
    pnpm run pagefind
    
    echo "=== Build completed successfully ==="
  """
  publish = "public"

[build.environment]
  HUGO_VERSION = "0.160.1"
  GO_VERSION = "1.21.5"
  NODE_VERSION = "22"
  # Netlify runs an implicit install step; ensure it never enforces frozen lockfiles
  PNPM_FLAGS = "--no-frozen-lockfile"
  HUGO_ENABLEGITINFO = "true"
  HUGO_LOG_I18N_WARNINGS = "true"
  HUGO_LOG_WARNINGS = "true"
  FORCE_COLOR = "1"
  PNPM_LOG_LEVEL = "debug"

[context.production.environment]
  HUGO_ENV = "production"

[context.deploy-preview]
  command = """
    set -e
    echo "=== Deploy Preview Build ==="
    echo "Deploy URL: $DEPLOY_PRIME_URL"
    pnpm install --verbose --no-frozen-lockfile
    hugo --gc --minify --buildFuture -b $DEPLOY_PRIME_URL --logLevel debug --printI18nWarnings --printPathWarnings
    pnpm run pagefind
  """

[context.branch-deploy]
  command = """
    set -e
    echo "=== Branch Deploy Build ==="
    echo "Deploy URL: $DEPLOY_PRIME_URL"
    pnpm install --verbose --no-frozen-lockfile
    hugo --gc --minify -b $DEPLOY_PRIME_URL --logLevel debug --printI18nWarnings --printPathWarnings
    pnpm run pagefind
  """

[[plugins]]
  package = "netlify-plugin-hugo-cache-resources"
  [plugins.inputs]
    debug = true

# ─── Headers ───────────────────────────────────────────────────────────────────

[[headers]]
  for = "*.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json; charset=UTF-8"

[[headers]]
  for = "index.xml"
  [headers.values]
    Content-Type = "application/rss+xml"

# Prevent indexing of low-value auto-generated taxonomy/author pages
[[headers]]
  for = "/author/*"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/fr/author/*"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/authors/*"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/fr/authors/*"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/tags/*"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/fr/tags/*"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/categories/*"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/fr/categories/*"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/publication_types/*"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/fr/publication_types/*"
  [headers.values]
    X-Robots-Tag = "noindex"

# Prevent indexing of RSS feeds
[[headers]]
  for = "*.xml"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    # CSP — migrated from old site, updated for Blox v0.12 + Tailwind
    Content-Security-Policy = '''
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' cdnjs.cloudflare.com cdn.jsdelivr.net www.googletagmanager.com www.google-analytics.com d1bxh8uas1mnw7.cloudfront.net badge.dimensions.ai embed.altmetric.com api.altmetric.com identity.netlify.com maps.googleapis.com;
      style-src 'self' 'unsafe-inline' cdnjs.cloudflare.com fonts.googleapis.com badge.dimensions.ai embed.altmetric.com;
      img-src 'self' data: maps.googleapis.com maps.gstatic.com *.tile.openstreetmap.org cdnjs.cloudflare.com www.googletagmanager.com www.google-analytics.com d1bxh8uas1mnw7.cloudfront.net *.altmetric.com badge.dimensions.ai;
      font-src 'self' cdnjs.cloudflare.com fonts.gstatic.com data:;
      connect-src 'self' www.google-analytics.com analytics.google.com *.analytics.google.com www.googletagmanager.com cdn.jsdelivr.net maps.googleapis.com badge.dimensions.ai metrics-api.dimensions.ai identity.netlify.com cdnjs.cloudflare.com;
      frame-src www.google.com www.googletagmanager.com d1bxh8uas1mnw7.cloudfront.net *.altmetric.com;
      manifest-src 'self';
      form-action 'none';
      frame-ancestors 'none';
      object-src 'none';
      base-uri 'self';
      upgrade-insecure-requests'''

